<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09090b"/>
      <stop offset="60%" stop-color="#18181b"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="finance-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-grad)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent-grad)"/>

  <!-- Package name badge -->
  <rect x="80" y="60" width="340" height="36" rx="18" fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.4)" stroke-width="1"/>
  <text x="250" y="84" font-family="'Courier New', monospace" font-size="15" fill="#818cf8" text-anchor="middle" letter-spacing="1">@junseop-shin/my-ui-lib</text>

  <!-- Main title -->
  <text x="80" y="178" font-family="system-ui, sans-serif" font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-2">My UI Library</text>

  <!-- Subtitle -->
  <text x="80" y="228" font-family="system-ui, sans-serif" font-size="24" fill="#a1a1aa">금융권 특화 React 디자인 시스템 · npm 패키지</text>

  <!-- Divider -->
  <line x1="80" y1="268" x2="1120" y2="268" stroke="#27272a" stroke-width="1"/>

  <!-- Theme cards -->
  <!-- Light Theme Card -->
  <rect x="80" y="296" width="300" height="180" rx="12" fill="#ffffff" stroke="#e4e4e7" stroke-width="1"/>
  <text x="104" y="326" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#71717a" letter-spacing="2">LIGHT</text>
  <rect x="104" y="340" width="120" height="36" rx="8" fill="#6366f1"/>
  <text x="164" y="364" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">Button</text>
  <rect x="104" y="388" width="252" height="12" rx="4" fill="#f4f4f5"/>
  <rect x="104" y="408" width="180" height="12" rx="4" fill="#f4f4f5"/>
  <rect x="104" y="440" width="80" height="28" rx="6" fill="rgba(99,102,241,0.1)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>
  <text x="144" y="459" font-family="system-ui, sans-serif" font-size="12" fill="#6366f1" text-anchor="middle">Badge</text>

  <!-- Dark Theme Card -->
  <rect x="410" y="296" width="300" height="180" rx="12" fill="#18181b" stroke="#3f3f46" stroke-width="1"/>
  <text x="434" y="326" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#71717a" letter-spacing="2">DARK</text>
  <rect x="434" y="340" width="120" height="36" rx="8" fill="#818cf8"/>
  <text x="494" y="364" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">Button</text>
  <rect x="434" y="388" width="252" height="12" rx="4" fill="#3f3f46"/>
  <rect x="434" y="408" width="180" height="12" rx="4" fill="#3f3f46"/>
  <rect x="434" y="440" width="80" height="28" rx="6" fill="rgba(129,140,248,0.15)" stroke="rgba(129,140,248,0.35)" stroke-width="1"/>
  <text x="474" y="459" font-family="system-ui, sans-serif" font-size="12" fill="#818cf8" text-anchor="middle">Badge</text>

  <!-- Finance Theme Card -->
  <rect x="740" y="296" width="300" height="180" rx="12" fill="#0c1a2e" stroke="#0ea5e9" stroke-width="1"/>
  <text x="764" y="326" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#0ea5e9" letter-spacing="2">FINANCE</text>
  <rect x="764" y="340" width="120" height="36" rx="8" fill="#0ea5e9"/>
  <text x="824" y="364" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#fff" text-anchor="middle">Button</text>
  <rect x="764" y="388" width="252" height="12" rx="4" fill="#1e3a5f"/>
  <rect x="764" y="408" width="180" height="12" rx="4" fill="#1e3a5f"/>
  <rect x="764" y="440" width="100" height="28" rx="6" fill="rgba(14,165,233,0.15)" stroke="rgba(14,165,233,0.35)" stroke-width="1"/>
  <text x="814" y="459" font-family="system-ui, sans-serif" font-size="12" fill="#0ea5e9" text-anchor="middle">Finance</text>

  <!-- Bottom: tech stack + author -->
  <line x1="80" y1="506" x2="1120" y2="506" stroke="#27272a" stroke-width="1"/>

  <!-- Stack pills -->
  <rect x="80" y="524" width="100" height="28" rx="14" fill="rgba(255,255,255,0.06)"/>
  <text x="130" y="543" font-family="system-ui, sans-serif" font-size="13" fill="#d4d4d8" text-anchor="middle">React 19</text>

  <rect x="194" y="524" width="120" height="28" rx="14" fill="rgba(255,255,255,0.06)"/>
  <text x="254" y="543" font-family="system-ui, sans-serif" font-size="13" fill="#d4d4d8" text-anchor="middle">TypeScript</text>

  <rect x="328" y="524" width="130" height="28" rx="14" fill="rgba(255,255,255,0.06)"/>
  <text x="393" y="543" font-family="system-ui, sans-serif" font-size="13" fill="#d4d4d8" text-anchor="middle">TailwindCSS</text>

  <rect x="472" y="524" width="100" height="28" rx="14" fill="rgba(255,255,255,0.06)"/>
  <text x="522" y="543" font-family="system-ui, sans-serif" font-size="13" fill="#d4d4d8" text-anchor="middle">Radix UI</text>

  <rect x="586" y="524" width="80" height="28" rx="14" fill="rgba(255,255,255,0.06)"/>
  <text x="626" y="543" font-family="system-ui, sans-serif" font-size="13" fill="#d4d4d8" text-anchor="middle">Rollup</text>

  <!-- Author -->
  <text x="1120" y="543" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="end">Junseop Shin</text>
</svg>
